spec_version: "2.0"
notion_spec_url: "https://www.notion.so/34b49d06885681468dd6d79d2e16d332"

cap_units: 2.0

tier_weights:
  "Tier 1": 1.0
  "Tier 2": 0.67
  "Tier 3": 1.0
  "Tier 4": 2.0

stage_status_matrix:
  building:
    ON_TRACK: 1.0
    AT_RISK: 2.0
    BEHIND: 2.0
    BLOCKED_CLIENT: 1.0
    BLOCKED_INTERNAL: 1.0
  stabilisation_delivery:
    ON_TRACK: 1.0
    AT_RISK: 2.0
    BEHIND: 2.0
    BLOCKED_CLIENT: 1.0
    BLOCKED_INTERNAL: 1.0
  close_out_retrospective:
    ON_TRACK: 0.0
    AT_RISK: 2.0
    BEHIND: 2.0
    BLOCKED_CLIENT: 1.0
    BLOCKED_INTERNAL: 1.0
  discovery:
    ON_TRACK: 0.0
    AT_RISK: 0.0
    BEHIND: 0.0
    BLOCKED_CLIENT: 0.0
    BLOCKED_INTERNAL: 0.0
  scoping_solution_design:
    ON_TRACK: 0.0
    AT_RISK: 0.0
    BEHIND: 0.0
    BLOCKED_CLIENT: 0.0
    BLOCKED_INTERNAL: 0.0

availability_bands:
  free_below: 1.0       # capacity_used < 1.0  -> FREE
  partial_below: 2.0    # 1.0 <= capacity_used < 2.0 -> PARTIAL ; >= 2.0 -> AT_CAP

hard_rules:
  max_total_active_projects: 4

scoping:
  max_slots_per_person: 2
  blocked_if_any_at_risk_or_behind: true

pto:
  hard_exclude_today: true
  soft_warning_days_ahead: 14

soft_signal:
  triggers:
    - all_scoping_or_discovery   # capacity_used == 0 AND total_projects > 0 AND every project is in scoping or discovery
    - all_close_out_on_track     # all non-zero-load projects are close_out_retrospective with ON_TRACK
    # ending_soon planned for follow-up task; do not implement now

terminal_statuses_filter:
  - ARCHIVED
  - CANCELED
  - COMPLETED

# Project staffing snapshot (sql/project_staffing.sql) — extra gates on top of CSV / Capacity.
staffing_ps_gates:
  enabled: true
  heavy_stages:
    - building
    - stabilisation_delivery
  light_stage_prefixes:
    - discovery
    - scoping
  blocked_status: BLOCKED_CLIENT
  min_heavy_projects_to_block: 3
  heavy_block_tier_lt: 3
  block_three_heavy_for_tier_gte_threshold: true
  block_any_building_non_blocked: true
  only_light_overrides_all: true
  deadline_this_week_overrides: true
  three_plus_one_blocked_scoping_only: true

# Tier 3 — Node 4 team layout: uses sql/project_staffing.sql snapshot when present
tier3_recommendation:
  exclude_so_if_active_orders_gte: 3
  exclude_soe_if_active_orders_gte: 3
  exclude_wfm_if_active_orders_gte: 0
  alternate_slots_per_role: 3
