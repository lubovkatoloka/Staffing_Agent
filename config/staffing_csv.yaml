# People & Tags CSV (Notion export) — склейка с Occupation по email.
#
# Обновление данных без Notion API:
# 1) В Notion: Export блока / базы → zip.
# 2) Достать из внутреннего zip CSV (имена с кириллицей в пути ломают unzip в терминале —
#    удобнее скопировать CSV вручную или распаковать скриптом в репозиторий).
# 3) Положить сюда как staffing_people_tags_all.csv (и при необходимости staffing_people_tags.csv).
# 4) Перезапустить бота — агент читает файл при каждом @mention.
#
# Переопределение пути: env STAFFING_PEOPLE_CSV_PATH
#
# Комментарии для жёстких исключений (do not staff / onboarding / …) берутся из живого Notion
# People & Tags через staffing_agent.exclusions (NOTION_API_KEY / NOTION_TOKEN), не из этого файла.

csv_path: notion_export/staffing_people_tags_all.csv
